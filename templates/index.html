<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; }
        .pitch { 
            background: #2a2a2a; border: 2px solid #ff6600; border-radius: 10px;
            height: 400px; position: relative; display: flex; flex-direction: column; justify-content: space-around;
        }
        .row { display: flex; justify-content: center; gap: 10px; }
        .slot { 
            width: 50px; height: 60px; background: #ff6600; border-radius: 5px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold;
        }
        .players-list { margin-top: 20px; background: #333; border-radius: 10px; padding: 10px; }
        .player-item { 
            display: flex; justify-content: space-between; padding: 10px; 
            border-bottom: 1px solid #444; cursor: pointer;
        }
        .btn-save { 
            width: 100%; padding: 15px; background: #ff6600; border: none; 
            color: white; font-weight: bold; margin-top: 20px; border-radius: 10px;
        }
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <span>Бюджет: <b id="budget">100</b> 🪙</span>
        <span>Игроков: <b id="count">0/11</b></span>
    </div>

    <div class="pitch">
        <div class="row"><div class="slot">+</div><div class="slot">+</div></div> <div class="row"><div class="slot">+</div><div class="slot">+</div><div class="slot">+</div><div class="slot">+</div></div> <div class="row"><div class="slot">+</div><div class="slot">+</div><div class="slot">+</div><div class="slot">+</div></div> <div class="row"><div class="slot">+</div></div> </div>

    <div class="players-list">
        <h3>Доступные игроки</h3>
        <div id="player-container">
            <div class="player-item" onclick="addPlayer(10)">
                <span>Игрок 1 (НП)</span>
                <span>10.0 🪙</span>
            </div>
            <div class="player-item" onclick="addPlayer(6.5)">
                <span>Игрок 2 (ЗЩ)</span>
                <span>6.5 🪙</span>
            </div>
        </div>
    </div>

    <button class="btn-save" onclick="saveTeam()">СОХРАНИТЬ СОСТАВ</button>

    <script>
        let tg = window.Telegram.WebApp;
        let budget = 100;
        let count = 0;

        function addPlayer(price) {
            if (budget >= price && count < 11) {
                budget -= price;
                count++;
                document.getElementById('budget').innerText = budget.toFixed(1);
                document.getElementById('count').innerText = count + "/11";
            } else {
                alert("Недостаточно средств или мест!");
            }
        }

        function saveTeam() {
            // Отправляем остаток бюджета боту
            tg.sendData(budget.toString());
            tg.close();
        }

        tg.expand(); // Разворачивает окно на весь экран
    </script>
</body>
                        </html>
