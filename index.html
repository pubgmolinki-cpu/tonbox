<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONBOX NEWS</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; border: 1px solid #333; border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; }
        h2 { color: #ff004c; margin-top: 0; }
    </style>
</head>
<body>
    <h1>TONBOX NEWS</h1>
    <div id="news"></div>
    <script>
        async function load() {
            const r = await fetch('/api/news');
            const data = await r.json();
            document.getElementById('news').innerHTML = data.map(n => `
                <div class="card">
                    <img src="${n.image_url}">
                    <div class="card-content">
                        <h2>${n.title}</h2>
                        <p>${n.content}</p>
                    </div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
