<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TONBOX NEWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #120108; 
            --accent-red: #ff004c;
            --glow-color: rgba(255, 0, 76, 0.25); 
            --grad: linear-gradient(135deg, #ff004c 0%, #8a2be2 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; background: var(--bg-dark); color: #fff;
            font-family: 'Montserrat', sans-serif; height: 100%;
        }

        /* Фон теперь зафиксирован на весь сайт */
        .glow-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, var(--glow-color) 0%, rgba(18,1,8,1) 80%);
            z-index: -1;
        }

        .welcome-screen {
            position: fixed; inset: 0; display: flex; justify-content: center; 
            align-items: center; z-index: 1000; transition: 0.7s; padding: 20px;
        }
        .hidden-screen { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .welcome-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); padding: 40px 25px;
            border-radius: 35px; width: 100%; max-width: 400px; text-align: center;
        }
        
        .btn {
            display: flex; align-items: center; justify-content: center;
            padding: 16px; border-radius: 18px; font-weight: 700; font-size: 13px; 
            color: #fff; width: 100%; margin-top: 15px; border: none; cursor: pointer;
            background: var(--grad); text-decoration: none;
        }

        header {
            position: fixed; top: 0; width: 100%; padding: 15px 20px;
            display: none; align-items: center; background: rgba(18, 1, 8, 0.7);
            backdrop-filter: blur(15px); z-index: 900; border-bottom: 1px solid var(--glass-border);
        }

        .news-section { display: none; padding: 90px 15px 30px; max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
        .news-card {
            display: flex; background: var(--glass); border-radius: 25px;
            margin-bottom: 20px; overflow: hidden; border: 1px solid var(--glass-border);
        }
        .news-img { width: 40%; object-fit: cover; cursor: zoom-in; min-height: 150px; }
        .news-info { padding: 20px; flex: 1; }
        .news-info h2 { margin: 0 0 10px; color: var(--accent-red); font-size: 18px; }

        #photo-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        #photo-overlay img { max-width: 100%; max-height: 100%; object-fit: contain; }

        @media (max-width: 600px) {
            .news-card { flex-direction: column; }
            .news-img { width: 100%; height: 220px; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div id="screen-welcome" class="welcome-screen">
        <div class="welcome-card">
            <h1 style="font-weight:900;">TONBOX <span style="color:var(--accent-red)">NEWS</span></h1>
            <p>Самые свежие новости лиги здесь.</p>
            <button onclick="nextScreen()" class="btn">Смотреть Новости!</button>
        </div>
    </div>

    <div id="screen-about" class="welcome-screen hidden-screen">
        <div class="welcome-card">
            <p>TONBOX – первый новостник с полноценным ботом для лиги <b>ФТКЛ³</b>!</p>
            <button onclick="enterSite()" class="btn">Свежие Новости!</button>
        </div>
    </div>

    <header id="header">
        <div style="font-size:24px" onclick="location.reload()">☰</div>
        <div style="flex-grow:1; text-align:center; font-weight:900;">TONBOX NEWS</div>
    </header>

    <div class="news-section" id="news-section">
        <div id="news-container"></div>
    </div>

    <div id="photo-overlay" onclick="this.style.display='none'">
        <img id="full-photo" src="">
    </div>

    <script>
        function nextScreen() {
            document.getElementById('screen-welcome').classList.add('hidden-screen');
            document.getElementById('screen-about').classList.remove('hidden-screen');
        }
        function enterSite() {
            document.getElementById('screen-about').classList.add('hidden-screen');
            document.getElementById('header').style.display = 'flex';
            document.getElementById('news-section').style.display = 'block';
            loadNews();
        }
        async function loadNews() {
            const res = await fetch('/api/news');
            const news = await res.json();
            document.getElementById('news-container').innerHTML = news.map(n => `
                <div class="news-card">
                    <img src="${n.image_url}" class="news-img" onclick="openPhoto('${n.image_url}')">
                    <div class="news-info"><h2>${n.title}</h2><p>${n.content}</p></div>
                </div>`).join('');
        }
        function openPhoto(url) {
            document.getElementById('full-photo').src = url;
            document.getElementById('photo-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
