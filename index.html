<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TONSCORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #E30022; --bg: #0A0A0A; --card: #161616; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .header { background: var(--red); padding: 25px; text-align: center; font-weight: 900; letter-spacing: 2px; }
        
        /* Сетка главного меню */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }
        .menu-item {
            background: var(--card);
            height: 120px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
            transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.95); background: #222; }
        .menu-item i { font-size: 30px; margin-bottom: 10px; }
        .menu-item span { font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .back-btn { padding: 10px; color: var(--red); font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div class="header">TONSCORE</div>
    <div id="back" class="back-btn" onclick="showMain()">← Назад</div>

    <div id="main-menu" class="grid-menu">
        <div class="menu-item" onclick="openSection('table')"><i>📊</i><span>Таблица</span></div>
        <div class="menu-item" onclick="openSection('results')"><i>⚽</i><span>Результаты</span></div>
        <div class="menu-item" onclick="openSection('totw')"><i>⭐</i><span>TOTW</span></div>
        <div class="menu-item" onclick="openSection('clubs')"><i>🛡</i><span>Клубы</span></div>
        <div class="menu-item" onclick="openSection('stats')"><i>📈</i><span>Статистика</span></div>
    </div>

    <div id="content" style="padding: 15px; display: none;">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openSection(type) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('back').style.display = 'block';
            
            const content = document.getElementById('content');
            if(type === 'table') {
                content.innerHTML = '<h2>Таблица Дивизиона 3</h2><div style="background:#161616; padding:15px; border-radius:10px;">Здесь будет список команд...</div>';
            }
            // И так далее для каждой секции
        }

        function showMain() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('content').style.display = 'none';
            document.getElementById('back').style.display = 'none';
        }
    </script>
</body>
</html>
